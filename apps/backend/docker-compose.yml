version: '3.9'

name: cashback

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      # Host port 3001, not 3000 — infra/wdk-stack's app-node service also binds host 3000,
      # and the two stacks can be brought up at the same time (this one talks to it over
      # WDK_EVENT_BUS_REDIS_HOST/PORT when INDEXER_TRANSPORT=redis-stream).
      - '3001:3000'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cashback-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - cashback-net
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - cashback-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  cashback-net:
    driver: bridge
