name: wdk-stack

# Self-hosted WDK stack — Sub-project A (single chain: Ethereum Sepolia / USDT).
# See docs/wdk-self-hosted-stack/01-core-pipeline.md for the full design and the
# two-phase bring-up runbook (proc RPC keys must be captured from logs before booting
# the api-role siblings — see README.md in this directory).

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Exposes the event-bus stream to host-run consumers (e.g. apps/backend's
      # WDK_EVENT_BUS_REDIS_HOST=localhost:6380 — see apps/backend/.env.example).
      - '6380:6379'
    volumes:
      - redis_data:/data
    networks: [wdk-net]
    restart: unless-stopped

  mongo:
    image: mongo:7
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Host access for debugging (mongosh/Compass) against the WDK stack's own Mongo —
      # 27018, not 27017, since apps/backend's docker-compose.yml already binds 27017
      # for its own separate application database.
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    networks: [wdk-net]
    restart: unless-stopped

  indexer-evm-proc:
    build:
      context: ./vendor/wdk-indexer-wrk-evm
      dockerfile: ../../dockerfiles/indexer-evm.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default] # forwards the host's ssh-agent — needed for the private SpaceUY/wdk-indexer-wrk-base dep
    environment:
      WORKER_TYPE: wrk-erc20-indexer-proc
      ENV: production
      RACK: usdt-eth-1
      CHAIN: usdt-eth # config/usdt-eth.json — internal "chain":"ethereum" pointed at Sepolia RPC
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      USDT_ETH_CONTRACT_OVERRIDE: ${USDT_ETH_CONTRACT_OVERRIDE:-}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    volumes:
      - indexer_evm_store:/app/store
      - indexer_evm_status:/app/status
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-evm-api:
    build:
      context: ./vendor/wdk-indexer-wrk-evm
      dockerfile: ../../dockerfiles/indexer-evm.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default] # forwards the host's ssh-agent — needed for the private SpaceUY/wdk-indexer-wrk-base dep
    environment:
      WORKER_TYPE: wrk-erc20-indexer-api
      ENV: production
      RACK: usdt-eth-1-1
      CHAIN: usdt-eth
      PROC_RPC: ${INDEXER_PROC_RPC_KEY}
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL}
      USDT_ETH_CONTRACT_OVERRIDE: ${USDT_ETH_CONTRACT_OVERRIDE:-}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    depends_on:
      indexer-evm-proc: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-btc-proc:
    build:
      context: ./vendor/wdk-indexer-wrk-btc
      dockerfile: ../../dockerfiles/indexer-btc.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-btc-indexer-proc
      ENV: production
      RACK: bitcoin-1
      CHAIN: bitcoin
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      # BTC runs on mainnet (project requirement) — BTC_MAINNET_RPC_URL, not the
      # BTC_RPC_URL testnet4 endpoint used for earlier exploration.
      BTC_RPC_URL: ${BTC_MAINNET_RPC_URL}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    volumes:
      - indexer_btc_store:/app/store
      - indexer_btc_status:/app/status
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-btc-api:
    build:
      context: ./vendor/wdk-indexer-wrk-btc
      dockerfile: ../../dockerfiles/indexer-btc.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-btc-indexer-api
      ENV: production
      RACK: bitcoin-1-1
      CHAIN: bitcoin
      PROC_RPC: ${INDEXER_BTC_PROC_RPC_KEY}
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      BTC_RPC_URL: ${BTC_MAINNET_RPC_URL}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    depends_on:
      indexer-btc-proc: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  processor-bitcoin:
    build:
      context: ./vendor/wdk-indexer-processor-wrk
      dockerfile: ../../dockerfiles/processor.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-processor-indexer
      ENV: production
      RACK: processor-bitcoin-1
      CHAIN: bitcoin
      TOKEN: btc
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-spark-proc:
    build:
      context: ./vendor/wdk-indexer-wrk-spark
      dockerfile: ../../dockerfiles/indexer-spark.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-spark-indexer-proc
      ENV: production
      RACK: spark-1
      CHAIN: spark
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      SPARK_API_KEY: ${SPARK_API_KEY}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    volumes:
      - indexer_spark_store:/app/store
      - indexer_spark_status:/app/status
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-spark-api:
    build:
      context: ./vendor/wdk-indexer-wrk-spark
      dockerfile: ../../dockerfiles/indexer-spark.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-spark-indexer-api
      ENV: production
      RACK: spark-1-1
      CHAIN: spark
      PROC_RPC: ${INDEXER_SPARK_PROC_RPC_KEY}
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      SPARK_API_KEY: ${SPARK_API_KEY}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    depends_on:
      indexer-spark-proc: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  processor-spark:
    build:
      context: ./vendor/wdk-indexer-processor-wrk
      dockerfile: ../../dockerfiles/processor.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-processor-indexer
      ENV: production
      RACK: processor-spark-1
      CHAIN: spark
      TOKEN: btc
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-tron-proc:
    build:
      context: ./vendor/wdk-indexer-wrk-tron
      dockerfile: ../../dockerfiles/indexer-tron.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-trc20-indexer-proc
      ENV: production
      RACK: usdt-tron-1
      CHAIN: usdt-tron
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      TRON_RPC_URL: ${TRON_RPC_URL}
      TRON_USDT_CONTRACT: ${TRON_USDT_CONTRACT}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    volumes:
      - indexer_tron_store:/app/store
      - indexer_tron_status:/app/status
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-tron-api:
    build:
      context: ./vendor/wdk-indexer-wrk-tron
      dockerfile: ../../dockerfiles/indexer-tron.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      ssh: [default]
    environment:
      WORKER_TYPE: wrk-trc20-indexer-api
      ENV: production
      RACK: usdt-tron-1-1
      CHAIN: usdt-tron
      PROC_RPC: ${INDEXER_TRON_PROC_RPC_KEY}
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      TRON_RPC_URL: ${TRON_RPC_URL}
      TRON_USDT_CONTRACT: ${TRON_USDT_CONTRACT}
      MONGO_HOST: mongo
      REDIS_HOST: redis
    depends_on:
      indexer-tron-proc: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  processor-tron:
    build:
      context: ./vendor/wdk-indexer-processor-wrk
      dockerfile: ../../dockerfiles/processor.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-processor-indexer
      ENV: production
      RACK: processor-tron-1
      CHAIN: tron
      TOKEN: usdt
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  indexer-processor:
    build:
      context: ./vendor/wdk-indexer-processor-wrk
      dockerfile: ../../dockerfiles/processor.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-processor-indexer
      ENV: production
      RACK: w-0
      CHAIN: ethereum # family name, matches wdk-data-shard-wrk's TransferProcessorRouter — not "sepolia"
      TOKEN: usdt
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  data-shard-proc:
    build:
      context: ./vendor/wdk-data-shard-wrk
      dockerfile: ../../dockerfiles/data-shard.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-data-shard-proc
      ENV: production
      RACK: shard-1
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      SHARD_MONGO_DATABASE: wdk_shard_1
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    volumes:
      - shard1_store:/app/store
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [wdk-net]
    restart: unless-stopped

  data-shard-api:
    build:
      context: ./vendor/wdk-data-shard-wrk
      dockerfile: ../../dockerfiles/data-shard.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-data-shard-api
      ENV: production
      RACK: shard-1-1
      PROC_RPC: ${DATA_SHARD_PROC_RPC_KEY}
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      SHARD_MONGO_DATABASE: wdk_shard_1
      LOOKUP_MONGO_DATABASE: wdk_lookup
      REDIS_HOST: redis
    depends_on:
      data-shard-proc: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  ork:
    build:
      context: ./vendor/wdk-ork-wrk
      dockerfile: ../../dockerfiles/ork.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-ork-api
      ENV: production
      RACK: ork-1
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
    depends_on:
      mongo: { condition: service_healthy }
      data-shard-api: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  # Secondary ORK replica — same lookup DB (mongodb engine, no autobase), discovered by
  # app-node/data-shard over the shared orkTopic hyperswarm topic, no static config needed on
  # their side. SECONDARY=true is required: the mongodb engine infers master/secondary purely
  # from the --secondary CLI flag, and a node started without it (like `ork` above) always runs
  # as master — two masters would run the Sunday inactive-user cleanup cron twice.
  ork-2:
    build:
      context: ./vendor/wdk-ork-wrk
      dockerfile: ../../dockerfiles/ork.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    environment:
      WORKER_TYPE: wrk-ork-api
      ENV: production
      RACK: ork-2
      SECONDARY: 'true'
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      MONGO_HOST: mongo
      LOOKUP_MONGO_DATABASE: wdk_lookup
    depends_on:
      mongo: { condition: service_healthy }
      data-shard-api: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

  app-node:
    build:
      context: ./vendor/wdk-app-node
      dockerfile: ../../dockerfiles/app-node.Dockerfile
      additional_contexts:
        entrypoints: ./dockerfiles/entrypoints
      secrets: [PAT_TOKEN]
    ports:
      - '3000:3000'
    environment:
      WORKER_TYPE: wdk-server-http-base
      ENV: production
      PORT: 3000
      WDK_CAPABILITY: ${WDK_CAPABILITY}
      WDK_CRYPTO_KEY: ${WDK_CRYPTO_KEY}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
    depends_on:
      redis: { condition: service_healthy }
      ork: { condition: service_started }
      ork-2: { condition: service_started }
    networks: [wdk-net]
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  indexer_evm_store:
  indexer_evm_status:
  indexer_btc_store:
  indexer_btc_status:
  indexer_spark_store:
  indexer_spark_status:
  indexer_tron_store:
  indexer_tron_status:
  shard1_store:

networks:
  wdk-net:
    driver: bridge

secrets:
  PAT_TOKEN:
    environment: GITHUB_PAT
